# List of songbook editions to display on the site.
# Each edition is a dict with 'name' and optional 'hidden: true'.
# Hidden editions are accessible at /<name>/ but not shown on the site listing.
#
# Optional 'show_changelog: true' surfaces a collapsible "What's new" panel on the
# edition's card, listing the songs added/removed since the previous edition
# (sourced from the 'changelog' object in the edition's manifest). Defaults to false.
#
# Examples:
#   - name: current        # displayed on site
#   - name: wip
#     hidden: true         # accessible at /wip/ but not shown on site listing
editions:
  - name: womens-2026
    hidden: true
  - name: wexford-2026
    hidden: true
  - name: april-fools-2026
    hidden: true
  - name: current
    hidden: false
    show_changelog: true
  - name: monopolele-2026
    hidden: true
  - name: complete
  - name: ukulele-hooley-2025
    hidden: true
