# Build and deploy website - builds on PRs, deploys on main branch
name: Build and Deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs every 15 minutes (offset to avoid scheduler peak times)
  schedule:
    - cron: '2,17,32,47 * * * *'

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: write
  # Additional permissions only needed for deployment
  pages: write
  id-token: write
  # Additional permissions for PR preview deployments
  pull-requests: write

# Production deploys (main / schedule / manual) share the 'pages' group and must
# NOT cancel an in-progress run, so a deployment always finishes.
# PR builds use a per-PR group and DO cancel in-progress runs, so a new push
# supersedes the previous build instead of letting a stale one keep running.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('build-pr-{0}', github.event.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Build job - runs on all triggers including PRs
  build:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET: ukulele-tuesday-songbooks
      BUYMEACOFFEE_API_TOKEN: ${{ secrets.BUYMEACOFFEE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync

      # Persist Buy Me a Coffee data between runs so build.py hits the rate-limited
      # API at most once per TTL (see _fetch_with_cache in build.py). The run_id key
      # is always unique, so restore falls back to the most recent bmc-cache- entry
      # and the post-job step always saves the updated cache.
      - name: Cache Buy Me a Coffee data
        uses: actions/cache@v4
        with:
          path: .bmc-cache
          key: bmc-cache-${{ github.run_id }}
          restore-keys: |
            bmc-cache-

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Generate website
        run: uv run build.py

      - name: Upload build artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event_name == 'pull_request' && 'generated-site' || 'github-pages' }}
          path: 'public'
          retention-days: ${{ github.event_name == 'pull_request' && '1' || '30' }}

  # Deploy job - deploys to main branch or creates PR preview
  deploy:
    if: needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event_name == 'pull_request' && 'generated-site' || 'github-pages' }}
          path: public

      - name: Deploy to GitHub Pages (main branch only)
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          clean-exclude: pr-preview/

      - name: Deploy PR Preview (PRs only)
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: public
